:root{--bg:#f8fafc;--card:#fff;--accent:#2563eb;--accent2:#1e40af;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--light:#f1f5f9;--stripe:#f8fafc}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

header p{opacity:.85;font-size:14px}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:10;border-bottom:1px solid var(--border)}
.btn{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-all{background:#059669;color:#fff;border-color:#059669;font-weight:600}
.btn-all:hover{background:#047857}
.search-box{padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;width:220px;outline:none;transition:border .15s}
.search-box:focus{border-color:var(--accent)}
.batch-header{background:linear-gradient(135deg,#1e3a5f,#334155);color:#fff;padding:16px 20px;border-radius:12px;margin:24px 0 12px}
.batch-header h2{font-size:18px;font-weight:700}
.batch-header p{opacity:.8;font-size:13px;margin-top:2px}
.tbl-wrap{overflow-x:auto;margin-bottom:8px;border-radius:10px;border:1px solid var(--border);background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{position:sticky;top:52px;background:#1e293b;color:#fff;padding:9px 8px;text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:nth-child(even){background:var(--stripe)}
tbody tr:hover{background:#e0e7ff}
td{padding:7px 8px;vertical-align:top}
td:nth-child(1){color:var(--muted);font-size:11px;min-width:30px}
td:nth-child(2){font-weight:600;color:var(--accent2);white-space:nowrap}
td:nth-child(3){min-width:100px}
td:nth-child(4){font-style:italic;color:#475569;max-width:240px}
td:nth-child(5),td:nth-child(6),td:nth-child(7){font-size:12px;white-space:nowrap}
.dash{color:#cbd5e1}
.stats{text-align:center;color:var(--muted);font-size:12px;padding:12px;margin-top:8px}
.print-info{text-align:center;margin:10px 0 0;font-size:12px;color:var(--muted)}
.legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:10px 0;font-size:12px;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
footer{text-align:center;padding:30px 16px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:30px}

@media print{
  .controls,.search-box,.print-info,.no-print{display:none!important}
  header{background:#1e3a5f!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .batch-header{background:#334155!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;break-before:page}
  thead th{background:#1e293b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;position:static}
  tbody tr:nth-child(even){background:#f1f5f9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table{font-size:9px}
  td{padding:3px 4px}
  .batch-header{padding:10px 14px;margin:10px 0 6px}
  .batch-header h2{font-size:14px}
  body{font-size:9px}
  .container{padding:4px}
  .tbl-wrap{border-radius:4px}
}
@media(max-width:640px){
  table{font-size:11.5px}
  td:nth-child(5),td:nth-child(6),td:nth-child(7){font-size:10.5px}
  .controls{gap:5px}
  .btn{padding:5px 10px;font-size:12px}
}
</style>

let currentView="batch";
let currentBatch=0;
let searchTerm="";

function d(c){return c==="—"?'<span class="dash">—</span>':c}

function renderBatch(bi,globalOffset){
  const b=B[bi];
  const words=searchTerm?b.w.filter(w=>w[0].toLowerCase().includes(searchTerm)||w[1].toLowerCase().includes(searchTerm)):b.w;
  if(searchTerm&&words.length===0)return"";
  let h=`<div class="batch-header"><h2>${b.t}</h2><p>${b.d}</p></div>`;
  h+=`<div class="tbl-wrap"><table><thead><tr><th>#</th><th>Word</th><th>English</th><th>Example</th><th>Past</th><th>Present</th><th>Future</th></tr></thead><tbody>`;
  words.forEach((w,i)=>{
    const n=globalOffset+i+1;
    h+=`<tr><td>${n}</td><td>${w[0]}</td><td>${w[1]}</td><td>${w[2]}</td><td>${d(w[3])}</td><td>${d(w[4])}</td><td>${d(w[5])}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function render(){
  let html="";
  let totalShown=0;
  if(currentView==="all"){
    let offset=0;
    B.forEach((b,i)=>{
      const before=b.w.length;
      html+=renderBatch(i,offset);
      const shown=searchTerm?b.w.filter(w=>w[0].toLowerCase().includes(searchTerm)||w[1].toLowerCase().includes(searchTerm)).length:before;
      totalShown+=shown;
      offset+=shown;
    });
  }else{
    let offset=0;
    for(let i=0;i<currentBatch;i++){
      offset+=searchTerm?B[i].w.filter(w=>w[0].toLowerCase().includes(searchTerm)||w[1].toLowerCase().includes(searchTerm)).length:B[i].w.length;
    }
    html=renderBatch(currentBatch,offset);
    totalShown=searchTerm?B[currentBatch].w.filter(w=>w[0].toLowerCase().includes(searchTerm)||w[1].toLowerCase().includes(searchTerm)).length:B[currentBatch].w.length;
  }
  document.getElementById("content").innerHTML=html;
  const total=B.reduce((s,b)=>s+b.w.length,0);
  document.getElementById("stats").textContent=searchTerm?`Showing ${totalShown} results for "${searchTerm}" · Total: ${total} words`:`Showing ${totalShown} words · Total across all batches: ${total}`;
}

function showBatch(i){
  currentView="batch";currentBatch=i;
  document.querySelectorAll(".controls .btn").forEach((b,idx)=>{
    if(idx===0)b.classList.remove("active");
    else b.classList.toggle("active",idx-1===i);
  });
  render();
}

function showAll(){
  currentView="all";
  document.querySelectorAll(".controls .btn").forEach((b,idx)=>{
    if(idx===0)b.classList.add("active");
    else b.classList.remove("active");
  });
  render();
}

function filterWords(v){searchTerm=v.toLowerCase();render();}

render();
</script>
